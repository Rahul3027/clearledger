name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Type-check · Lint · Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test
        env:
          # Tests use mocked Supabase — real credentials not needed in CI
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-key
          STORAGE_BUCKET: clearledger-files
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
          DATABASE_URL_DIRECT: postgresql://placeholder:placeholder@localhost:5432/placeholder

      - name: Migration dry-run (schema check)
        run: npx drizzle-kit check || echo "No pending migrations"
        env:
          DATABASE_URL_DIRECT: postgresql://placeholder:placeholder@localhost:5432/placeholder
        continue-on-error: true
